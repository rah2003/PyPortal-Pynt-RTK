; PyPortal-Pynt-RTK — PlatformIO environments
;
; pynt-bringup : Phase 1 bench test suite (serial menu; see
;                firmware/pynt/bringup/main_bringup.cpp and
;                docs/hardware/checklists.md)
; pynt-rover   : Phase 2 Rover firmware (NTRIP -> RTCM3 -> F9P UART1,
;                RAWX logging, touch UI, SW Maps TCP)

[platformio]
src_dir = firmware
default_envs = pynt-bringup

[env:pynt-bringup]
platform = atmelsam
board = adafruit_pyportal_m4
framework = arduino
monitor_speed = 115200
build_src_filter = +<pynt/bringup/>
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit ILI9341@^1.6.1
    adafruit/Adafruit TouchScreen@^1.1.5
    ; Adafruit fork (adds WiFi.setPins for AirLift) — not in the PIO
    ; registry, pinned to a commit-ish branch from GitHub:
    WiFiNINA=https://github.com/adafruit/WiFiNINA.git
    greiman/SdFat@^2.2.3
    adafruit/Adafruit BusIO@^1.16.2

[env:pynt-rover]
platform = atmelsam
board = adafruit_pyportal_m4
framework = arduino
monitor_speed = 115200
build_src_filter = +<pynt/rover/>
build_flags =
    ; SERCOM RX ring: rides out WiFiNINA's blocking WiFi.begin() windows
    ; (~4 s max) at the F9P's ~2.5 kB/s actual rate — see ntrip.cpp header.
    -DSERIAL_BUFFER_SIZE=4096
    ; newlib-nano omits %f from printf-family by default; the UI formats
    ; lat/lon with snprintf("%.7f") — without this it prints empty.
    -Wl,-u,_printf_float
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit ILI9341@^1.6.1
    adafruit/Adafruit TouchScreen@^1.1.5
    WiFiNINA=https://github.com/adafruit/WiFiNINA.git
    greiman/SdFat@^2.2.3
    adafruit/Adafruit BusIO@^1.16.2
    sparkfun/SparkFun u-blox GNSS v3@^3.1.9
